name: Completar catálogo AliExpress México

on:
  workflow_dispatch:
  schedule:
    - cron: "23 06 * * *"

permissions:
  contents: write

concurrency:
  group: completar-catalogo-aliexpress-mx
  cancel-in-progress: false

jobs:
  completar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Obtener nombres, descripciones e imágenes
        env:
          MAX_PRODUCTS_PER_RUN: "20"
        run: python scripts/update_aliexpress_mx_metadata.py

      - name: Validar JavaScript
        run: node --check catalog-aliexpress-mx.js

      - name: Guardar los cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog-aliexpress-mx.js data/aliexpress-mx-metadata-cache.json
          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Completar metadatos del catálogo de México"
            git push
          fi
