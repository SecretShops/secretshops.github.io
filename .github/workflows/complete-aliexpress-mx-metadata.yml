name: Actualizar catálogo AliExpress México

on:
  workflow_dispatch:
  schedule:
    - cron: "23 06 * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-catalogo-aliexpress-mx
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Completar metadatos pendientes
        env:
          MAX_PRODUCTS_PER_RUN: "20"
        run: python3 scripts/update_aliexpress_mx_metadata.py

      - name: Reconstruir y validar
        run: npm run quality

      - name: Guardar datos generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
            exit 0
          fi

          git commit -m "Actualizar catálogo AliExpress México"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
