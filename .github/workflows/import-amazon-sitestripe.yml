name: Importar Amazon SiteStripe

on:
  push:
    branches:
      - main
    paths:
      - data/sources/amazon-es-products.csv
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: amazon-sitestripe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: npm ci

      - name: Importar productos e imágenes de Amazon
        run: node scripts/import-amazon-products.mjs

      - name: Reconstruir catálogo público
        run: npm run build:catalog

      - name: Ejecutar pruebas
        run: npm test

      - name: Validar catálogo y enlaces
        run: npm run validate:catalog

      - name: Guardar catálogo generado
        run: |
          if git diff --quiet; then
            echo "No hay cambios generados."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog
          git commit -m "Actualizar catálogo Amazon desde SiteStripe"
          git push

