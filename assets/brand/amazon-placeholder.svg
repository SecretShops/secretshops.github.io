<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-labelledby="title description">
  <title id="title">Producto disponible en Amazon</title>
  <description id="description">Ficha provisional de Amazon mientras la imagen del producto no está disponible.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#111827" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#background)"/>
  <rect x="105" y="150" width="790" height="700" rx="54" fill="#fff" filter="url(#shadow)"/>

  <g aria-hidden="true">
    <text x="500" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="146" font-weight="700" fill="#111827">amazon</text>
    <path d="M342 505c104 76 252 83 366 9" fill="none" stroke="#ff9900" stroke-width="25" stroke-linecap="round"/>
    <path d="M687 482l41 31-44 20" fill="none" stroke="#ff9900" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="500" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#334155">Producto disponible en Amazon</text>
  <text x="500" y="718" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#64748b">Consulta la ficha para ver imagen, precio y disponibilidad</text>
</svg>
